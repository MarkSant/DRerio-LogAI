name: Public API Check

on: [pull_request, push]

jobs:
  api-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb
          pip install poetry
          poetry install

      - name: Run API Check Script
        run: |
          xvfb-run -a poetry run python scripts/check_public_api.py

      - name: Run API Contract Tests
        run: |
          xvfb-run -a poetry run pytest tests/ui/test_gui_public_api_contract.py tests/ui/test_api_breaking_changes.py -v
