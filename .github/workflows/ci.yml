name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PYTHONUTF8: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          pip install poetry

      - name: Configure Poetry virtualenv path
        run: |
          # Use in-project virtualenvs to avoid cache corruption issues
          poetry config virtualenvs.in-project true

      - name: Cache Poetry dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pypoetry
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-ansi
        timeout-minutes: 10

      - name: Build wizard template archive
        run: |
          poetry run python scripts/build_templates.py

      - name: Compile translations
        run: |
          poetry run python scripts/compile_translations.py

      - name: Cache build artifacts
        uses: actions/cache@v5
        with:
          path: |
            src/zebtrack/wizard_templates.zip
            src/zebtrack/locale
          key: ${{ runner.os }}-build-${{ hashFiles('src/zebtrack/ui/wizard/templates/*.yaml', 'locale/**/*.po') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Run ruff check
        run: |
          poetry run ruff check .

      - name: Run ruff format check
        run: |
          poetry run ruff format --check .

      - name: Check Public API Concordance
        run: |
          poetry run python scripts/check_public_api.py

      - name: Run mypy (type check)
        run: |
          poetry run mypy .

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libavcodec-extra ffmpeg libopencv-dev python3-opencv

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg --no-progress

      - name: Install Poetry
        run: |
          pip install poetry

      - name: Configure Poetry virtualenv path
        run: |
          # Use in-project virtualenvs to avoid cache corruption issues
          poetry config virtualenvs.in-project true

      - name: Cache Poetry dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pypoetry
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-ansi
        timeout-minutes: 15

      - name: Build wizard template archive
        run: |
          poetry run python scripts/build_templates.py

      - name: Compile translations
        run: |
          poetry run python scripts/compile_translations.py

      - name: Cache build artifacts
        uses: actions/cache@v5
        with:
          path: |
            src/zebtrack/wizard_templates.zip
            src/zebtrack/locale
          key: ${{ runner.os }}-build-${{ hashFiles('src/zebtrack/ui/wizard/templates/*.yaml', 'locale/**/*.po') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: "Run tests (Linux - with xvfb)"
        if: runner.os == 'Linux'
        run: |
          xvfb-run --auto-servernum poetry run pytest -m "not (gui or slow)" --cov-fail-under=60 --timeout=300 --timeout-method=thread
        timeout-minutes: 15

      - name: "Run tests (Windows)"
        if: runner.os == 'Windows'
        run: |
          poetry run pytest -m "not (gui or slow)" --cov-fail-under=60 --timeout=300 --timeout-method=thread
        timeout-minutes: 15

      - name: Archive coverage results
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            coverage.xml
          retention-days: 30
