name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          pip install poetry

      - name: Configure Poetry virtualenv path
        run: |
          # Use in-project virtualenvs to avoid cache corruption issues
          poetry config virtualenvs.in-project true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-ansi

      - name: Build wizard template archive
        run: |
          poetry run python scripts/build_templates.py

      - name: Compile translations
        run: |
          poetry run python scripts/compile_translations.py

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            src/zebtrack/wizard_templates.zip
            src/zebtrack/locale
          key: ${{ runner.os }}-build-${{ hashFiles('src/zebtrack/ui/wizard/templates/*.yaml', 'locale/**/*.po') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Run ruff check
        run: |
          poetry run ruff check .

      - name: Run ruff format check
        run: |
          poetry run ruff format --check .

      - name: Validate documentation consistency
        run: |
          poetry run python scripts/validate_docs.py

      - name: Update Copilot context map
        run: |
          poetry run python scripts/generate_copilot_context.py

      - name: Check if context map changed
        run: |
          git diff --exit-code .copilot-context.yaml || (echo "⚠️ Copilot context out of date. Run: poetry run python scripts/generate_copilot_context.py" && exit 1)

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libavcodec-extra ffmpeg libopencv-dev python3-opencv

      - name: Install Poetry
        run: |
          pip install poetry

      - name: Configure Poetry virtualenv path
        run: |
          # Use in-project virtualenvs to avoid cache corruption issues
          poetry config virtualenvs.in-project true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-ansi

      - name: Build wizard template archive
        run: |
          poetry run python scripts/build_templates.py

      - name: Compile translations
        run: |
          poetry run python scripts/compile_translations.py

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            src/zebtrack/wizard_templates.zip
            src/zebtrack/locale
          key: ${{ runner.os }}-build-${{ hashFiles('src/zebtrack/ui/wizard/templates/*.yaml', 'locale/**/*.po') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Run tests with coverage (v2.1: pytest-timeout configured)
        run: |
          xvfb-run --auto-servernum poetry run pytest -m "not (gui or slow)" --cov-fail-under=70 --timeout=300 --timeout-method=thread
        timeout-minutes: 10

      - name: Archive coverage results
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
          retention-days: 30
