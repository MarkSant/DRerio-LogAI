name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: |
          pip install poetry
      - name: Install dependencies
        run: |
          poetry install
      - name: Build wizard template archive
        run: |
          poetry run python scripts/build_templates.py
      - name: Compile translations
        run: |
          poetry run python scripts/compile_translations.py
      - name: Run ruff
        run: |
          poetry run ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libavcodec-extra ffmpeg libopencv-dev python3-opencv
      - name: Install Poetry
        run: |
          pip install poetry
      - name: Install dependencies
        run: |
          poetry install
      - name: Build wizard template archive
        run: |
          poetry run python scripts/build_templates.py
      - name: Compile translations
        run: |
          poetry run python scripts/compile_translations.py
      - name: Run tests
        run: |
          xvfb-run --auto-servernum poetry run pytest
        timeout-minutes: 15
