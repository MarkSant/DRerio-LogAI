name: Refactoring Quality Gates

# This workflow enforces quality standards during the v4.0 refactoring process.
# It tracks metrics, prevents regressions, and ensures code quality improvements.
#
# Related: docs/REFACTOR-MASTER-PLAN-2025.md

on:
  push:
    branches:
      - main
      - 'refactor/**'
      - 'claude/**'
  pull_request:
    branches:
      - main

jobs:
  # ============================================================================
  # Code Complexity Analysis
  # ============================================================================
  complexity-check:
    name: Code Complexity Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: |
          poetry install --only dev --no-interaction --no-ansi
          # Install analysis tools (if not in pyproject.toml yet)
          poetry run pip install radon || true

      - name: Run Radon complexity analysis
        id: complexity
        run: |
          echo "## Cyclomatic Complexity Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Analyze critical files
          CRITICAL_FILES=(
            "src/zebtrack/core/main_view_model.py"
            "src/zebtrack/ui/gui.py"
            "src/zebtrack/core/project_manager.py"
            "src/zebtrack/core/video_processing_service.py"
          )

          for file in "${CRITICAL_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "### $file" >> $GITHUB_STEP_SUMMARY
              poetry run radon cc "$file" -s -a --no-assert >> $GITHUB_STEP_SUMMARY || true
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Check complexity thresholds
        run: |
          # Fail if any file has average complexity > 10 (C grade)
          echo "Checking complexity thresholds..."

          CRITICAL_FILES=(
            "src/zebtrack/core/main_view_model.py"
            "src/zebtrack/ui/gui.py"
          )

          FAIL=0
          for file in "${CRITICAL_FILES[@]}"; do
            if [ -f "$file" ]; then
              # Get average complexity (allowing for failure if radon not installed)
              AVG=$(poetry run radon cc "$file" -a -s 2>/dev/null | grep "Average complexity" | awk '{print $NF}' || echo "0")

              # Use bc for floating point comparison
              if [ "$(echo "$AVG > 10.0" | bc -l 2>/dev/null || echo "0")" -eq 1 ]; then
                echo "::warning file=$file::High complexity ($AVG) - target is < 10.0"
                # Don't fail initially, just warn
                # FAIL=1
              else
                echo "âś“ $file complexity: $AVG"
              fi
            fi
          done

          # exit $FAIL  # Disabled for now - enable after Sprint 3

  # ============================================================================
  # Dead Code Detection
  # ============================================================================
  dead-code-check:
    name: Dead Code Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: |
          poetry install --only dev --no-interaction --no-ansi
          poetry run pip install vulture || true

      - name: Run Vulture dead code detection
        id: vulture
        continue-on-error: true
        run: |
          echo "## Dead Code Report" >> $GITHUB_STEP_SUMMARY

          # Run vulture with custom whitelist
          if command -v poetry run vulture &> /dev/null; then
            poetry run vulture src/zebtrack/ --min-confidence 80 >> vulture_report.txt || true

            # Show summary in step output
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            head -50 vulture_report.txt >> $GITHUB_STEP_SUMMARY || echo "No dead code detected" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "Vulture not installed - skipping" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================================
  # Test Coverage Tracking
  # ============================================================================
  coverage-tracking:
    name: Test Coverage Tracking
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for trend analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libavcodec-extra ffmpeg libopencv-dev python3-opencv

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/pypoetry
          key: venv-refactor-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-refactor-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi
        timeout-minutes: 10

      - name: Build wizard template archive
        run: poetry run python scripts/build_templates.py

      - name: Compile translations
        run: poetry run python scripts/compile_translations.py

      - name: Run tests with coverage
        id: coverage
        run: |
          xvfb-run --auto-servernum poetry run pytest \
            -m "not (gui or slow)" \
            --cov=src/zebtrack \
            --cov-report=xml \
            --cov-report=term \
            --timeout=300 \
            --timeout-method=thread \
            -v
        timeout-minutes: 15

      - name: Generate coverage report
        run: |
          echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          poetry run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Check coverage thresholds
        run: |
          # Extract total coverage percentage
          COVERAGE=$(poetry run coverage report --format=total)
          echo "Current coverage: ${COVERAGE}%"

          # Baseline: 61% (as of Jan 2025)
          # Target: 70% minimum, 80-85% goal
          MINIMUM=60

          if [ "$COVERAGE" -lt "$MINIMUM" ]; then
            echo "::error::Coverage ($COVERAGE%) below minimum threshold ($MINIMUM%)"
            exit 1
          else
            echo "::notice::Coverage ($COVERAGE%) meets minimum threshold ($MINIMUM%)"
          fi

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: |
            coverage.xml
            .coverage
          retention-days: 90

  # ============================================================================
  # Metrics Tracking
  # ============================================================================
  metrics-tracking:
    name: Code Metrics Tracking
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Track file sizes
        id: metrics
        run: |
          echo "## Code Metrics Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Critical File Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Lines | Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|--------|--------|" >> $GITHUB_STEP_SUMMARY

          # Track critical files with targets
          track_file() {
            local file=$1
            local target=$2

            if [ -f "$file" ]; then
              lines=$(wc -l < "$file")
              status="âš ď¸Ź"
              if [ "$lines" -le "$target" ]; then
                status="âś…"
              fi
              echo "| \`$file\` | $lines | $target | $status |" >> $GITHUB_STEP_SUMMARY
            fi
          }

          # Current sizes and targets (from REFACTOR-MASTER-PLAN-2025.md)
          track_file "src/zebtrack/core/main_view_model.py" 800
          track_file "src/zebtrack/ui/gui.py" 500
          track_file "src/zebtrack/core/project_manager.py" 1500
          track_file "src/zebtrack/core/video_processing_service.py" 1500

          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Count new coordinator files
        run: |
          echo "### Coordinator Implementation Progress" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          COORDINATOR_FILES=$(find src/zebtrack/coordinators -name "*.py" -not -name "__*" | wc -l)
          echo "- Coordinator classes: $COORDINATOR_FILES / 5 target" >> $GITHUB_STEP_SUMMARY

          UI_COMPONENT_FILES=$(find src/zebtrack/ui/components -name "*.py" -not -name "__*" -not -name "base*" | wc -l)
          echo "- UI components: $UI_COMPONENT_FILES / 12 target" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Count test files
        run: |
          echo "### Test Coverage Progress" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          COORDINATOR_TESTS=$(find tests/coordinators -name "test_*.py" 2>/dev/null | wc -l)
          echo "- Coordinator tests: $COORDINATOR_TESTS" >> $GITHUB_STEP_SUMMARY

          UI_TESTS=$(find tests/ui/components -name "test_*.py" 2>/dev/null | wc -l)
          echo "- UI component tests: $UI_TESTS" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Documentation Checks
  # ============================================================================
  documentation-check:
    name: Documentation Quality
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check refactoring documentation exists
        run: |
          echo "## Documentation Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          REQUIRED_DOCS=(
            "docs/REFACTOR-MASTER-PLAN-2025.md"
            "docs/API_REFERENCE_V3.md"
            "docs/ARCHITECTURE.md"
            "docs/DEPENDENCY_INJECTION_GUIDE.md"
          )

          ALL_EXIST=true
          for doc in "${REQUIRED_DOCS[@]}"; do
            if [ -f "$doc" ]; then
              echo "âś… \`$doc\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "âťŚ \`$doc\` - MISSING" >> $GITHUB_STEP_SUMMARY
              ALL_EXIST=false
            fi
          done

          if [ "$ALL_EXIST" = false ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "::error::Required documentation missing"
            exit 1
          fi

      - name: Validate sprint progress tracking
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Sprint Progress" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Extract sprint status from REFACTOR-MASTER-PLAN-2025.md if it exists
          if [ -f "docs/REFACTOR-MASTER-PLAN-2025.md" ]; then
            # Count how many sprints are mentioned
            SPRINT_COUNT=$(grep -c "^### Sprint" docs/REFACTOR-MASTER-PLAN-2025.md || echo "0")
            echo "- Documented sprints: $SPRINT_COUNT / 16" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================================
  # Summary Status
  # ============================================================================
  quality-gate-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs:
      - complexity-check
      - dead-code-check
      - coverage-tracking
      - metrics-tracking
      - documentation-check
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# đźŽŻ Refactoring Quality Gates Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "All quality gate checks completed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check status of all jobs
          COMPLEXITY="${{ needs.complexity-check.result }}"
          DEAD_CODE="${{ needs.dead-code-check.result }}"
          COVERAGE="${{ needs.coverage-tracking.result }}"
          METRICS="${{ needs.metrics-tracking.result }}"
          DOCS="${{ needs.documentation-check.result }}"

          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Complexity | $COMPLEXITY |" >> $GITHUB_STEP_SUMMARY
          echo "| Dead Code | $DEAD_CODE |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | $COVERAGE |" >> $GITHUB_STEP_SUMMARY
          echo "| Metrics | $METRICS |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | $DOCS |" >> $GITHUB_STEP_SUMMARY

      - name: Check if any job failed
        run: |
          if [ "${{ needs.complexity-check.result }}" == "failure" ] || \
             [ "${{ needs.coverage-tracking.result }}" == "failure" ] || \
             [ "${{ needs.metrics-tracking.result }}" == "failure" ] || \
             [ "${{ needs.documentation-check.result }}" == "failure" ]; then
            echo "::error::One or more quality gates failed"
            exit 1
          fi
