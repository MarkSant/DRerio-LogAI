version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      dependencies:
        patterns:
          - "*"

  # Maintain dependencies for Poetry (Python)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      # setuptools pinned <81 due to docxcompose/pkg_resources dependency
      - dependency-name: "setuptools"
        update-types: ["version-update:semver-major"]
