[tool.poetry]
name = "zebtrack-controller"
version = "0.1.0"
description = "A graphical application for object tracking in video streams, with integration for hardware control via Arduino."
authors = ["The Project Developers <placeholder@example.com>"]
license = "MIT"
readme = "README.md"
packages = [{include = "zebtrack", from = "src"}]

[tool.poetry.dependencies]
python = ">=3.12"
numpy = "~=2.2.6"
opencv-python = "~=4.12.0"
pyserial = "~=3.5"
openvino = "~=2025.1"
ultralytics = ">=8.3.179,<9.0.0"
pyyaml = "^6.0.2"
pydantic = "^2.11.7"
structlog = "^25.4.0"
Pillow = "^10.4.0"
pyarrow = "^21.0.0"
pandas = "^2.3.1"
scipy = "^1.16.1"
shapely = "^2.1.1"
networkx = "^3.5"
seaborn = "^0.13.2"
python-docx = "^1.1.2"
openpyxl = "^3.1.5"
filterpy = "^1.4.5"

[tool.poetry.scripts]
zebtrack = "zebtrack.__main__:main"

[tool.poetry.group.dev.dependencies]
ruff = "^0.12.9"
pytest = "^8.4.1"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
pythonpath = [
  "src"
]
