# Pre-commit hooks configuration for ZebTrack-AI
# Install: poetry run pre-commit install
# Run manually: poetry run pre-commit run --all-files

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # Allow custom YAML tags
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json, --ignore-path, .markdownlintignore]

  # Poetry lock file check
  - repo: https://github.com/python-poetry/poetry
    rev: 1.8.0
    hooks:
      - id: poetry-check
      - id: poetry-lock
        args: [--check]

  # Local hooks for project-specific checks
  - repo: local
    hooks:
      - id: check-path-consistency
        name: Check Path | str consistency
        entry: poetry run python scripts/check_path_consistency.py
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: validate-docs
        name: Validate documentation consistency
        entry: poetry run python scripts/validate_docs.py
        language: system
        pass_filenames: false
        always_run: true

      - id: update-copilot-context
        name: Update Copilot context map
        entry: poetry run python scripts/generate_copilot_context.py
        language: system
        pass_filenames: false
        stages: [pre-push]

# Global settings
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]

# Faster feedback
fail_fast: false
