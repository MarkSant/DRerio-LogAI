[pytest]
addopts = -ra --cov=zebtrack --cov-report=term-missing --cov-report=html --cov-report=xml --cov-fail-under=70 -n=auto

testpaths =
    tests

norecursedirs =
    tests/manual

# Custom markers for test categorization
markers =
    gui: Tests that require Tkinter GUI components (run sequentially with -n0)
    slow: Tests that take significant time (>1s) to complete
    integration: Integration tests that test multiple components together
    unit: Unit tests that test a single component in isolation
    ttkbootstrap_singleton: Tests affected by ttkbootstrap Style singleton (run in isolation)

# Usage:
# - Default (fast tests only): pytest
# - GUI tests: pytest -m gui -n0
# - All tests: pytest -m "" -n0