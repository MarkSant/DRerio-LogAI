[pytest]
# Default: run NON-GUI tests only to prevent system freeze
# GUI tests are EXCLUDED by default (see -m "not (gui or slow or ttkbootstrap_singleton)");
# to run GUI tests, use: pytest -m gui -n0
addopts =
    -ra
    --tb=short
    -m "not (gui or slow or ttkbootstrap_singleton)"
    -n0
    --maxfail=10
    --timeout=300
    --timeout-method=thread
    --cov=zebtrack
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=18

testpaths =
    tests
    src

# Filter warnings from external dependencies
# The -W command line flag (e.g., -W error::DeprecationWarning) overrides pytest.ini filterwarnings.
# To enforce DeprecationWarnings as errors for ZebTrack code while ignoring external packages,
# DO NOT use -W flag; rely on these filters instead.
filterwarnings =
    # Default: show all warnings
    default
    # Ignore DeprecationWarnings from specific external packages that we cannot control
    # These packages use deprecated APIs (pkg_resources.declare_namespace, etc.)
    # Context: docxtpl → docxcompose → pkg_resources → declare_namespace('sphinxcontrib')
    ignore:Deprecated call to .pkg_resources.declare_namespace.*:DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:docxcompose.*
    ignore::DeprecationWarning:docxtpl.*
    ignore::DeprecationWarning:sphinxcontrib.*
    ignore:pkg_resources is deprecated as an API.*:UserWarning
    ignore:.*vert.*deprecated.*:PendingDeprecationWarning:seaborn.*
    ignore:.*torch\.distributed\.reduce_op.*:FutureWarning
    # Phase 3.7: Suppress EventBus v1 deprecation warnings during tests.
    # These are expected until Phase 4+ completes the v1→v2 migration.
    # See docs/decisions/ADR-009-event-bus-unification.md
    ignore:EventBus v1 .*DEPRECATED.*:DeprecationWarning
    # If ZebTrack code introduces DeprecationWarnings, they will still be shown
    # To make them errors for ZebTrack, add: error::DeprecationWarning:zebtrack.*

norecursedirs =
    tests/manual
    .hypothesis

# Custom markers for test categorization
markers =
    smoke: Fast smoke tests for critical components (< 30s total)
    gui: Tests that require Tkinter GUI components (run sequentially with -n0)
    slow: Tests that take significant time (>1s) to complete
    integration: Integration tests that test multiple components together
    unit: Unit tests that test a single component in isolation
    ttkbootstrap_singleton: Tests affected by ttkbootstrap Style singleton (run in isolation)
    property: Property-based tests (run with pytest -m property)
    benchmark: Performance benchmark tests (run with pytest -m benchmark -n0 --benchmark-only)

# pytest-rerunfailures: Rerun flaky GUI tests (Tk timing, display issues)
# Applied only to GUI tests; use --reruns 2 with -m gui
# NOTE: rerun options must be passed via CLI, not addopts, to avoid non-gui reruns

# Usage Examples:
# - Smoke tests (< 30s, fast feedback):       poetry run pytest -m smoke
# - Default (fast tests only, parallel):      poetry run pytest
# - GUI tests (MUST use -n0, with reruns):    poetry run pytest -m gui -n0 --reruns 2 --reruns-delay 1
# - Slow tests:                               poetry run pytest -m slow
# - Property-based tests:                     poetry run pytest -m property
# - Benchmark tests (MUST use -n0):           poetry run pytest -m benchmark -n0 --benchmark-only
# - All tests (DANGER: will fail without -n0):poetry run pytest -m "" -n0
# - Non-GUI tests (parallel, fast):           poetry run pytest -m "not gui"
# - All markers included:                     poetry run pytest -m "" -n0
#
# CRITICAL: GUI tests REQUIRE -n0 due to ttkbootstrap.Style singleton conflicts.
#           Running "pytest -m gui" without -n0 will cause TclError failures.
# CRITICAL: Benchmark tests REQUIRE -n0 because pytest-benchmark cannot run in parallel.
