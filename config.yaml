# Zebtrack Controller Configuration
# This file contains the main settings for the application.
# You can edit these values to match your setup.

camera:
  index: 1
  # The resolution used when defining the detection zones.
  # The application will scale these zones if your camera uses a different resolution.
  desired_width: 1280
  desired_height: 720

arduino:
  # The serial port your Arduino is connected to (e.g., COM5 on Windows, /dev/ttyACM0 on Linux).
  port: 'COM5'
  baud_rate: 9600

yolo_model:
  # Path to the trained model weights file (.pt) for animal tracking.
  path: 'best_seg.pt'
  # Confidence threshold: detections below this value are ignored.
  confidence_threshold: 0.3
  # Non-Maximum Suppression (NMS) threshold: filters overlapping boxes.
  nms_threshold: 0.3

video_processing:
  # Frames Per Second (FPS) used when saving video files.
  fps: 30
  # Interval for object detection (e.g., process 1 frame every 10).
  # This optimizes performance, as detection can be slow.
  processing_interval: 10
  # Frame offset for processing. With an offset of 1 and interval of 10,
  # frames 1, 11, 21, etc., will be processed.
  processing_offset: 1

reproducibility:
  # Seed for random number generators to ensure that repeated runs with the
  # same video and settings produce identical results.
  seed: 42
