# Zebtrack Controller Configuration
# This file contains the main settings for the application.
# You can edit these values to match your setup.

camera:
  index: 1
  # The resolution used when defining the detection zones.
  # The application will scale these zones if your camera uses a different resolution.
  desired_width: 1280
  desired_height: 720

arduino:
  # The serial port your Arduino is connected to (e.g., COM5 on Windows, /dev/ttyACM0 on Linux).
  port: 'COM5'
  baud_rate: 9600

recorder:
  # Flush buffered detection rows to Parquet automatically every N seconds/rows.
  flush_interval_seconds: 5.0
  flush_row_threshold: 500

yolo_model:
  # Path to the trained model weights file (.pt) for animal tracking.
  path: 'best_seg.pt'
  # Confidence threshold: detections below this value are ignored.
  # Lowered to 0.05 to work better with models that have lower confidence scores
  confidence_threshold: 0.05
  # Non-Maximum Suppression (NMS) threshold: filters overlapping boxes.
  nms_threshold: 0.5

bytetrack:
  # Association thresholds usados pelo ByteTrack durante o rastreamento.
  track_threshold: 0.25
  match_threshold: 0.15

video_processing:
  # Frames Per Second (FPS) used when saving video files.
  fps: 30
  # Interval for object detection (e.g., process 1 frame every 10).
  # This optimizes performance, as detection can be slow.
  processing_interval: 10
  # Frame offset for processing. With an offset of 1 and interval of 10,
  # frames 1, 11, 21, etc., will be processed.
  processing_offset: 1
  # Threshold for detecting a "sharp turn" in degrees per second.
  sharp_turn_threshold_deg_s: 90.0
  # Velocity threshold for freezing detection (cm/s).
  freezing_velocity_threshold: 1.5
  # Minimum duration for a freezing episode (seconds).
  freezing_min_duration_s: 1.0
  # Single animal tracking mode - ensures consistent track_id=1
  single_animal_per_aquarium: false

reproducibility:
  # Seed for random number generators to ensure that repeated runs with the
  # same video and settings produce identical results.
  seed: 42

model_selection:
  # Method for aquarium detection: "seg" for segmentation, "det" for detection
  aquarium_method: "seg"
  # Method for animal tracking: "seg" for segmentation, "det" for detection  
  animal_method: "det"

weights:
  # Filename for segmentation model weights
  seg_filename: "best_seg.pt"
  # Filename for detection model weights
  det_filename: "best_oi.pt"

# ROI inclusion rule settings
roi_inclusion_rule: "bbox_intersects"
roi_buffer_radius_value: 0.5
roi_min_bbox_overlap_ratio: 0.05  # Reduced from 0.10 to detect more tangential entries

trajectory_smoothing:
  window_length: 7
  polyorder: 3

tracking:
  use_single_subject_tracker: false

ui_features:
  # Enable the wizard flow (v1.6+ default) while allowing legacy fallback when needed.
  use_wizard_for_project_creation: true
  # Progressive rollout switch for the controller↔GUI event bus (Phase 1 default: off).
  enable_event_queue: false
