codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  status:
    project:
      core:
        target: auto
        threshold: 1%
        if_ci_failed: error
        flags:
          - core
        # Ratchet: never allow coverage to decrease
        # Auto target uses the base commit coverage as minimum
      gui:
        target: auto
        threshold: 1%
        flags:
          - gui
        informational: true
    patch:
      default:
        target: 60%
        threshold: 1%
